<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music Arena CSV 格式转换</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f5f5f5;
    color: #333;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
  }
  h1 { font-size: 24px; margin-bottom: 8px; }
  .subtitle { color: #666; margin-bottom: 32px; font-size: 14px; }

  .drop-zone {
    width: 100%;
    max-width: 560px;
    border: 2px dashed #ccc;
    border-radius: 12px;
    padding: 48px 24px;
    text-align: center;
    background: #fff;
    cursor: pointer;
    transition: all 0.2s;
  }
  .drop-zone:hover, .drop-zone.drag-over {
    border-color: #4A90D9;
    background: #f0f7ff;
  }
  .drop-zone .icon { font-size: 48px; margin-bottom: 12px; }
  .drop-zone p { color: #666; font-size: 14px; }
  .drop-zone .hint { color: #999; font-size: 12px; margin-top: 8px; }

  #fileInput { display: none; }

  .result {
    width: 100%;
    max-width: 560px;
    margin-top: 24px;
    background: #fff;
    border-radius: 12px;
    padding: 24px;
    display: none;
  }
  .result.show { display: block; }
  .result.success { border-left: 4px solid #34C759; }
  .result.error { border-left: 4px solid #FF3B30; }

  .result h3 { margin-bottom: 12px; font-size: 16px; }
  .result .info { color: #666; font-size: 13px; line-height: 1.8; }
  .result .info span { color: #333; font-weight: 500; }

  .btn {
    display: inline-block;
    margin-top: 16px;
    padding: 10px 24px;
    background: #4A90D9;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn:hover { background: #357ABD; }
  .btn:disabled { background: #ccc; cursor: not-allowed; }

  .error-msg { color: #FF3B30; font-size: 13px; margin-top: 8px; }

  .preview {
    margin-top: 16px;
    max-height: 200px;
    overflow-y: auto;
    font-family: "SF Mono", Monaco, Consolas, monospace;
    font-size: 11px;
    background: #f8f8f8;
    border-radius: 6px;
    padding: 12px;
    white-space: pre;
    color: #555;
    line-height: 1.6;
  }

  footer {
    margin-top: 48px;
    color: #bbb;
    font-size: 12px;
  }
</style>
</head>
<body>

<h1>Music Arena CSV 格式转换</h1>
<p class="subtitle">上传算法原始表格（CSV / Excel），自动转换为评测平台所需格式</p>

<div class="drop-zone" id="dropZone">
  <div class="icon">📄</div>
  <p>拖拽文件到这里，或点击选择</p>
  <p class="hint">支持 .csv / .xlsx / .xls</p>
</div>
<input type="file" id="fileInput" accept=".csv,.xlsx,.xls">

<div class="result" id="result">
  <h3 id="resultTitle"></h3>
  <div class="info" id="resultInfo"></div>
  <div class="error-msg" id="errorMsg" style="display:none"></div>
  <div class="preview" id="preview" style="display:none"></div>
  <button class="btn" id="downloadBtn" style="display:none">下载转换后的文件</button>
</div>

<footer>Music Arena · 纯浏览器端转换，文件不会上传到服务器</footer>

<script>
const FORMAT_DESC = "格式说明：ABC列为固定列，原始表格没有的情况下为空。D列往后的列，按照具体原始表格内的对战模型进行相应调整，千万不要篡改原始表格中的数据！！";
const KNOWN_FIXED = new Set(["unique_id", "prompt", "中文描述", "prompt_cn", "prompt_en", "extra_text"]);

const dropZone = document.getElementById("dropZone");
const fileInput = document.getElementById("fileInput");
const result = document.getElementById("result");
const resultTitle = document.getElementById("resultTitle");
const resultInfo = document.getElementById("resultInfo");
const errorMsg = document.getElementById("errorMsg");
const preview = document.getElementById("preview");
const downloadBtn = document.getElementById("downloadBtn");

// ── 事件绑定 ──
dropZone.addEventListener("click", () => fileInput.click());
dropZone.addEventListener("dragover", e => { e.preventDefault(); dropZone.classList.add("drag-over"); });
dropZone.addEventListener("dragleave", () => dropZone.classList.remove("drag-over"));
dropZone.addEventListener("drop", e => {
  e.preventDefault();
  dropZone.classList.remove("drag-over");
  const file = e.dataTransfer.files[0];
  if (file) handleFile(file);
});
fileInput.addEventListener("change", e => {
  if (e.target.files[0]) handleFile(e.target.files[0]);
});
downloadBtn.addEventListener("click", downloadResult);

let convertedCSV = "";
let outputFileName = "";

// ── OSS 路径前缀去除 ──
function stripOssPrefix(path) {
  if (!path) return path;
  path = path.trim();
  const idx = path.indexOf("label/");
  if (idx >= 0) return path.substring(idx);
  if (path.startsWith("oss://")) {
    const parts = path.split("/");
    // oss://bucket/rest... → parts = ["oss:", "", "bucket", "rest..."]
    if (parts.length >= 4) return parts.slice(3).join("/");
  }
  return path;
}

// ── CSV 转义 ──
function escapeCSV(value) {
  if (value == null) return "";
  value = String(value);
  if (value.includes(",") || value.includes('"') || value.includes("\n")) {
    return '"' + value.replace(/"/g, '""') + '"';
  }
  return value;
}

// ── 核心转换逻辑（接收 headers + rows）──
function convertData(headers, rows) {
  if (!headers || headers.length === 0) throw new Error("文件没有表头");

  // 区分固定列和模型列
  const modelCols = headers.filter(h => !KNOWN_FIXED.has(h));
  const hasPrompt = headers.includes("prompt");
  const hasCnDesc = headers.includes("中文描述");
  const hasPromptCn = headers.includes("prompt_cn");
  const hasPromptEn = headers.includes("prompt_en");

  if (!hasPrompt && !hasPromptEn) throw new Error("缺少英文 prompt 列（prompt 或 prompt_en）");
  if (!hasCnDesc && !hasPromptCn) throw new Error("缺少中文描述列（中文描述 或 prompt_cn）");

  // 构建输出
  const outputHeaders = ["prompt_cn", "prompt_en", "extra_text", ...modelCols];
  const outputRows = [];

  for (const row of rows) {
    const newRow = {};
    newRow.prompt_cn = hasCnDesc ? (row["中文描述"] || "") : (row["prompt_cn"] || "");
    newRow.prompt_en = hasPrompt ? (row["prompt"] || "") : (row["prompt_en"] || "");
    newRow.extra_text = row["extra_text"] || "";
    for (const col of modelCols) {
      newRow[col] = stripOssPrefix(row[col] || "");
    }
    outputRows.push(newRow);
  }

  // 生成 CSV 文本
  const lines = [];
  lines.push(FORMAT_DESC + ",".repeat(outputHeaders.length - 1));
  lines.push(outputHeaders.map(escapeCSV).join(","));
  for (const row of outputRows) {
    lines.push(outputHeaders.map(h => escapeCSV(row[h])).join(","));
  }

  // 统计非空数据量（跳过空值）
  let nonEmptyCount = 0;
  const perModelStats = {};
  for (const col of modelCols) {
    let count = 0;
    for (const row of rows) {
      const val = (row[col] || "").toString().trim();
      if (val) count++;
    }
    perModelStats[col] = count;
    nonEmptyCount += count;
  }

  return { csv: "\uFEFF" + lines.join("\n"), headers: headers, modelCols: modelCols, rowCount: outputRows.length, nonEmptyCount: nonEmptyCount, perModelStats: perModelStats };
}

// ── 解析 CSV 文件 ──
function parseCSVText(text) {
  const parseResult = Papa.parse(text.trim(), { header: true, skipEmptyLines: true });
  if (parseResult.errors.length > 0) {
    throw new Error("CSV 解析失败: " + parseResult.errors[0].message);
  }
  return { headers: parseResult.meta.fields, rows: parseResult.data };
}

// ── 解析 Excel 文件 ──
async function parseExcelBuffer(buffer) {
  const zip = await JSZip.loadAsync(buffer);
  const wbFile = zip.file("xl/workbook.xml");
  if (!wbFile) throw new Error("无效的 Excel 文件结构");

  const wbContent = await wbFile.async("string");

  // 检测 strict OOXML 命名空间
  if (wbContent.includes("purl.oclc.org/ooxml/spreadsheetml/main")) {
    return await parseStrictOOXML(zip);
  }

  // 标准格式：用 SheetJS
  const workbook = XLSX.read(buffer, { type: "array" });
  if (!workbook.sheetNames || workbook.sheetNames.length === 0) {
    throw new Error("Excel 文件没有工作表");
  }
  const sheet = workbook.sheets[workbook.sheetNames[0]];
  const jsonData = XLSX.utils.sheet_to_json(sheet, { defval: "", raw: false });
  if (!jsonData || jsonData.length === 0) throw new Error("Excel 文件为空");

  const headers = Object.keys(jsonData[0]);
  return { headers, rows: jsonData };
}

// ── Strict OOXML 手动解析（绕过 SheetJS）──
async function parseStrictOOXML(zip) {
  const ns = "http://purl.oclc.org/ooxml/spreadsheetml/main";

  // 1. 读取共享字符串
  const sharedStrings = [];
  const ssFile = zip.file("xl/sharedStrings.xml");
  if (ssFile) {
    const ssXml = await ssFile.async("string");
    const ssDoc = new DOMParser().parseFromString(ssXml, "application/xml");
    const siNodes = ssDoc.getElementsByTagNameNS(ns, "si");
    for (let i = 0; i < siNodes.length; i++) {
      const tNodes = siNodes[i].getElementsByTagNameNS(ns, "t");
      let text = "";
      for (let j = 0; j < tNodes.length; j++) {
        text += tNodes[j].textContent || "";
      }
      sharedStrings.push(text);
    }
  }

  // 2. 读取第一个工作表
  const sheetFile = zip.file("xl/worksheets/sheet1.xml");
  if (!sheetFile) throw new Error("找不到工作表 sheet1");
  const sheetXml = await sheetFile.async("string");
  const sheetDoc = new DOMParser().parseFromString(sheetXml, "application/xml");

  // 3. 解析行数据
  const rowNodes = sheetDoc.getElementsByTagNameNS(ns, "row");
  if (rowNodes.length === 0) throw new Error("工作表中没有数据");

  // 将列字母转为索引: A→0, B→1, ..., Z→25, AA→26, ...
  function colToIndex(colStr) {
    let idx = 0;
    for (let i = 0; i < colStr.length; i++) {
      idx = idx * 26 + (colStr.charCodeAt(i) - 64);
    }
    return idx - 1;
  }

  const allRows = [];
  let maxCol = 0;

  for (let i = 0; i < rowNodes.length; i++) {
    const cells = rowNodes[i].getElementsByTagNameNS(ns, "c");
    const rowData = {};
    for (let j = 0; j < cells.length; j++) {
      const cell = cells[j];
      const ref = cell.getAttribute("r") || "";
      const colStr = ref.replace(/[0-9]/g, "");
      const colIdx = colToIndex(colStr);
      if (colIdx + 1 > maxCol) maxCol = colIdx + 1;

      const type = cell.getAttribute("t");
      const vNode = cell.getElementsByTagNameNS(ns, "v")[0];
      let value = "";

      if (type === "s" && vNode) {
        // 共享字符串引用
        const idx = parseInt(vNode.textContent, 10);
        value = sharedStrings[idx] || "";
      } else if (vNode) {
        value = vNode.textContent || "";
      } else {
        // 检查内联字符串 (is/t)
        const isNode = cell.getElementsByTagNameNS(ns, "is")[0];
        if (isNode) {
          const tNode = isNode.getElementsByTagNameNS(ns, "t")[0];
          value = tNode ? (tNode.textContent || "") : "";
        }
      }
      rowData[colIdx] = value;
    }
    allRows.push(rowData);
  }

  // 4. 转为 headers + rows 格式
  if (allRows.length < 2) throw new Error("数据不足，至少需要表头 + 1行数据");

  const headerRow = allRows[0];
  const headers = [];
  for (let i = 0; i < maxCol; i++) {
    headers.push(headerRow[i] || `col_${i + 1}`);
  }

  const rows = [];
  for (let r = 1; r < allRows.length; r++) {
    const row = {};
    let hasData = false;
    for (let c = 0; c < maxCol; c++) {
      const val = allRows[r][c] || "";
      row[headers[c]] = val;
      if (val) hasData = true;
    }
    if (hasData) rows.push(row); // 跳过完全空行
  }

  if (rows.length === 0) throw new Error("Excel 文件中没有有效数据行");
  return { headers, rows };
}

// ── 处理文件 ──
function handleFile(file) {
  result.className = "result";
  errorMsg.style.display = "none";
  preview.style.display = "none";
  downloadBtn.style.display = "none";

  const name = file.name.toLowerCase();
  const isCSV = name.endsWith(".csv");
  const isExcel = name.endsWith(".xlsx") || name.endsWith(".xls");

  if (!isCSV && !isExcel) {
    showError("请选择 .csv / .xlsx / .xls 格式的文件");
    return;
  }

  dropZone.querySelector("p").textContent = "正在处理: " + file.name;

  if (isCSV) {
    // CSV: 读文本 → Papa Parse
    const reader = new FileReader();
    reader.onload = function(e) {
      try {
        const { headers, rows } = parseCSVText(e.target.result);
        const result_data = convertData(headers, rows);
        showSuccess(file, result_data);
      } catch (err) {
        showError(err.message);
        dropZone.querySelector("p").textContent = "拖拽文件到这里，或点击选择";
      }
    };
    reader.readAsText(file, "UTF-8");
  } else {
    // Excel: 读 ArrayBuffer → 标准化 strict OOXML → SheetJS
    const reader = new FileReader();
    reader.onload = async function(e) {
      try {
        const buffer = new Uint8Array(e.target.result);
        const { headers, rows } = await parseExcelBuffer(buffer);
        const result_data = convertData(headers, rows);
        showSuccess(file, result_data);
      } catch (err) {
        showError(err.message);
        dropZone.querySelector("p").textContent = "拖拽文件到这里，或点击选择";
      }
    };
    reader.readAsArrayBuffer(file);
  }
}

function showSuccess(file, result_data) {
  convertedCSV = result_data.csv;

  const baseName = file.name.replace(/\.(csv|xlsx|xls)$/i, "");
  outputFileName = baseName + "_converted.csv";

  result.className = "result show success";
  resultTitle.textContent = "转换成功";

  const modelCount = result_data.modelCols.length;
  const rowCount = result_data.rowCount;
  const nonEmpty = result_data.nonEmptyCount;
  const total = modelCount * rowCount;

  resultInfo.innerHTML =
    "原始文件: <span>" + file.name + "</span><br>" +
    "模型数量: <span>" + modelCount + " 个</span><br>" +
    "数据行数: <span>" + rowCount + " 条</span><br>" +
    "总数据量: <span>" + total + "（有效 " + nonEmpty + "，空值 " + (total - nonEmpty) + "）</span><br>" +
    "模型列: <span>" + result_data.modelCols.join(", ") + "</span><br>" +
    "输出文件: <span>" + outputFileName + "</span>";

  const previewLines = convertedCSV.split("\n").slice(0, 4).map(l =>
    l.length > 120 ? l.substring(0, 120) + "..." : l
  );
  preview.textContent = previewLines.join("\n");
  preview.style.display = "block";

  downloadBtn.style.display = "inline-block";
  downloadBtn.textContent = "下载 " + outputFileName;

  dropZone.querySelector("p").textContent = "拖拽文件到这里，或点击选择";
}

function showError(msg) {
  result.className = "result show error";
  resultTitle.textContent = "转换失败";
  resultInfo.innerHTML = "";
  errorMsg.textContent = msg;
  errorMsg.style.display = "block";
}

// ── 下载 ──
function downloadResult() {
  if (!convertedCSV) return;
  const blob = new Blob([convertedCSV], { type: "text/csv;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = outputFileName;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
</script>
</body>
</html>
